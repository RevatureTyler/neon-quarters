<body>

<header class="site-header">
  <div class="logo"><a href="index.html" style="color:inherit"><span class="coin"></span> NEON QUARTERS</a></div>
  <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle theme">☀</button>
</header>

<main style="max-width:640px;">
  <p class="section-label">SUBMIT A GAME</p>
  <h1 style="font-size:1.1rem; margin:0 0 0.5rem;">Got a game we should add?</h1>
  <p class="tagline" style="margin-bottom:1.75rem;">
    We only publish games under CC0, MIT, or another open license, with the creator credited.
    Fill this out and it will open a pre filled email. Games are added by hand after a quick license check.
  </p>

  <form id="submitForm" class="submit-form" action="mailto:tharbykc892@gmail.com" method="get" enctype="text/plain">
    <label class="form-field">
      <span>Game title *</span>
      <input type="text" name="title" required>
    </label>

    <div class="form-row">
      <label class="form-field">
        <span>Type *</span>
        <select name="type" required>
          <option value="html5">HTML5</option>
          <option value="swf">SWF (Flash)</option>
        </select>
      </label>
      <label class="form-field">
        <span>Genre *</span>
        <input type="text" name="genre" placeholder="Arcade, Puzzle, …" required>
      </label>
    </div>

    <label class="form-field">
      <span>Link to game or file *</span>
      <input type="url" name="link" placeholder="https://itch.io/…" required>
    </label>

    <div class="form-row">
      <label class="form-field">
        <span>License *</span>
        <input type="text" name="license" placeholder="CC0, MIT, …" required>
      </label>
      <label class="form-field">
        <span>Original creator credit *</span>
        <input type="text" name="credit" required>
      </label>
    </div>

    <label class="form-field">
      <span>Source / proof of license *</span>
      <input type="url" name="source" placeholder="Link showing the license" required>
    </label>

    <label class="form-field">
      <span>Your email</span>
      <input type="email" name="contact" placeholder="you@email.com">
    </label>

    <label class="form-field">
      <span>Notes</span>
      <textarea name="notes" rows="3" placeholder="Anything else we should know"></textarea>
    </label>

    <button type="submit" class="btn">SEND SUBMISSION</button>
  </form>
</main>

<footer>
  <p><a href="index.html">&larr; Back to arcade</a> · <a href="licenses.html">Game Licenses &amp; Credits</a></p>
