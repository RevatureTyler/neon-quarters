<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Neon Quarters: Loading Game…</title>
<meta name="description" content="Play instantly in your browser. No download required.">
<meta property="og:type" content="website">
<meta property="og:title" id="ogTitle" content="Neon Quarters">
<meta property="og:description" id="ogDescription" content="Play instantly in your browser. No download required.">
<meta property="og:image" id="ogImage" content="games/thumbs/js-racer.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" id="twitterTitle" content="Neon Quarters">
<meta name="twitter:description" id="twitterDescription" content="Play instantly in your browser. No download required.">
<meta name="twitter:image" id="twitterImage" content="games/thumbs/js-racer.jpg">
<script src="js/theme-init.js"></script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Ruffle (SWF player) loads on-demand from js/ruffle/ruffle.js — see player.js.
     Follow README.md step 1 to add the self-hosted build before launch. -->
</head>
<body>

<header class="site-header">
  <div class="logo"><a href="index.html"><span class="coin"></span> NEON QUARTERS</a></div>
  <div style="display:flex; align-items:center; gap:0.9rem;">
    <div class="insert-coin">PRESS START<span class="blink">_</span></div>
    <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle theme">☀</button>
  </div>
</header>

<main>
  <div class="game-header">
    <a href="index.html" class="back-link">&larr; ARCADE</a>
    <h1 id="gameTitle" class="game-title"><span class="skeleton skeleton-line" style="width:12rem; height:1.1rem; display:inline-block;"></span></h1>
    <button type="button" id="favBtn" class="fav-btn" aria-label="Add to favorites" aria-pressed="false">♡ Favorite</button>
  </div>

  <div class="ad-slot" data-ad-slot="3333333333">Ad slot: above game</div>

  <div class="player-shell">
    <div id="playerFrame" class="player-frame"></div>
  </div>

  <div class="player-meta">
    <div class="meta-badges">
      <span class="skeleton skeleton-pill" id="gameGenre"></span>
      <span class="skeleton skeleton-pill" id="gameLicense"></span>
    </div>
    <span class="skeleton skeleton-line" id="gameCredit" style="width:10rem; height:0.75rem; display:inline-block;"></span>
  </div>

  <div class="tag-row" id="tagRow"></div>

  <p class="game-description" id="gameDescription"></p>

  <div class="how-to-play" id="howToPlaySection" hidden>
    <p class="section-label">HOW TO PLAY</p>
    <p id="howToPlayText"></p>
  </div>

  <div class="share-row" id="shareRow" style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.75rem;"></div>

  <div class="rating-block">
    <span class="rating-label">Rate this game:</span>
    <div class="rating-stars" id="ratingStars" role="radiogroup" aria-label="Rate this game"></div>
    <span class="rating-status" id="ratingStatus"></span>
  </div>

  <div class="high-score-block" id="highScoreBlock" hidden>
    <span class="rating-label">Your best score:</span>
    <span id="highScoreValue" class="high-score-value">0</span>
    <span class="rating-status">Tracked in this browser only. <a href="leaderboards.html">See all your stats</a></span>
  </div>

  <div class="creator-bio" id="creatorBio" hidden>
    <p class="section-label">ABOUT THE CREATOR</p>
    <p id="creatorBioText"></p>
  </div>

  <div class="comments-section">
    <p class="section-label">COMMENTS</p>
    <form id="commentForm" class="comment-form">
      <input type="text" id="commentName" placeholder="Name (optional)" class="search-input" style="width:180px;">
      <textarea id="commentText" rows="2" placeholder="Say something about this game…" required class="comment-input"></textarea>
      <button type="submit" class="btn" style="align-self:flex-start;">POST</button>
    </form>
    <ul class="comment-list" id="commentList"></ul>
  </div>

  <div class="ad-slot" data-ad-slot="4444444444">Ad slot: below game</div>

  <div class="more-games">
    <p class="section-label">MORE GAMES</p>
    <div class="game-grid" id="moreGrid"></div>
  </div>
</main>

<footer>
  <p><a href="index.html">&larr; Back to all games</a> · <a href="licenses.html">Game Licenses &amp; Credits</a> · <a href="leaderboards.html">Leaderboards</a></p>
</footer>

<script src="js/games-data.js"></script>
<script src="js/scores.js"></script>
<script src="js/player.js"></script>
<script src="js/theme.js"></script>
<script src="js/cookie-consent.js"></script>
<script src="js/ads.js"></script>
</body>
</html>
